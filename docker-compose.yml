services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rinha-nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"

  api1:
    image: mxlange/rinha-go-2026:v0.0.5
    container_name: rinha-api1
    environment:
      PORT: "8080"
      RESOURCES_DIR: /app/resources
      SEARCH_BACKEND: "hnsw"
      HNSW_M: "16"
      HNSW_EF_SEARCH: "2"
    networks:
      - rinha-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api2:
    image: mxlange/rinha-go-2026:v0.0.5
    container_name: rinha-api2
    environment:
      PORT: "8080"
      RESOURCES_DIR: /app/resources
      SEARCH_BACKEND: "hnsw"
      HNSW_M: "16"
      HNSW_EF_SEARCH: "2"
    networks:
      - rinha-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

networks:
  rinha-net:
    driver: bridge
